<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD15C"/>
      <stop offset="100%" stop-color="#E8A100"/>
    </linearGradient>
  </defs>
  <!-- Maskable: full bleed background, content in safe zone (40% from edge minimum) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <text x="50%" y="55%"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="system-ui, -apple-system, 'Plus Jakarta Sans', sans-serif"
        font-size="240"
        font-weight="800"
        letter-spacing="-12"
        fill="#1E1B16">K</text>
</svg>
